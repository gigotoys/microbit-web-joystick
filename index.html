<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>micro:bit Web 藍牙搖桿</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            overscroll-behavior-y: contain;
            touch-action: none;
        }

        #joystick-base {
            box-shadow:
                inset 0 0 20px rgba(0,0,0,0.5),
                0 4px 10px rgba(0,0,0,0.3);
        }

        #joystick-stick {
            box-shadow:
                0 10px 15px -3px rgba(0,0,0,0.5),
                inset 0 -3px 6px rgba(0,0,0,0.2);

            transition: transform 0.05s linear;
        }

        .snap-back {
            transition: transform 0.2s cubic-bezier(0.175,0.885,0.32,1.275) !important;
        }
    </style>
</head>

<body class="bg-gray-900 text-white h-[100dvh] w-screen overflow-hidden font-sans select-none touch-none">

<div class="w-full h-full flex flex-col items-center justify-center">

    <!-- 標題 -->
    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold">micro:bit Web 搖桿</h1>
        <p class="text-gray-400 text-sm mt-2">
            Web Bluetooth + micro:bit UART
        </p>
    </div>

    <!-- 藍牙狀態 -->
    <div class="bg-gray-800 rounded-2xl p-5 w-80 shadow-xl border border-gray-700 mb-8">

        <div class="flex items-center justify-between mb-4">

            <div class="flex items-center gap-2">
                <div id="bt-indicator"
                     class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]">
                </div>

                <span id="bt-status"
                      class="text-sm text-gray-300">
                    未連線
                </span>
            </div>

            <button id="connectBtn"
                    class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm active:scale-95">
                連接
            </button>

        </div>

        <div class="grid grid-cols-2 gap-4 text-center">

            <div class="bg-gray-900 rounded-xl p-3 border border-gray-700">
                <div class="text-gray-500 text-xs mb-1">X</div>
                <div id="x-val"
                     class="text-2xl font-bold text-blue-400">
                    0
                </div>
            </div>

            <div class="bg-gray-900 rounded-xl p-3 border border-gray-700">
                <div class="text-gray-500 text-xs mb-1">Y</div>
                <div id="y-val"
                     class="text-2xl font-bold text-green-400">
                    0
                </div>
            </div>

        </div>

        <div class="mt-4 bg-gray-900 rounded-xl p-3 border border-gray-700 flex justify-between">

            <span class="text-gray-500 text-sm">指令</span>

            <span id="cmd-val"
                  class="font-mono text-yellow-400 font-bold">
                S
            </span>

        </div>

    </div>

    <!-- 搖桿 -->
    <div id="joystick-base"
         class="relative w-52 h-52 bg-gray-800 rounded-full border-4 border-gray-700 flex items-center justify-center">

        <!-- 十字 -->
        <div class="absolute w-full h-0.5 bg-gray-700 opacity-30"></div>
        <div class="absolute h-full w-0.5 bg-gray-700 opacity-30"></div>

        <!-- 推桿 -->
        <div id="joystick-stick"
             class="absolute w-24 h-24 rounded-full bg-gradient-to-br from-gray-500 to-gray-700 border border-gray-500 flex items-center justify-center">

            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-gray-600 to-gray-800 border border-gray-600"></div>

        </div>

    </div>

    <!-- 按鍵 -->
    <div class="flex gap-10 mt-10">

        <button id="btn-a"
                class="w-20 h-20 rounded-full bg-blue-600 shadow-[0_6px_0_#1e3a8a] active:translate-y-[6px] active:shadow-none text-2xl font-bold">
            A
        </button>

        <button id="btn-b"
                class="w-20 h-20 rounded-full bg-red-600 shadow-[0_6px_0_#7f1d1d] active:translate-y-[6px] active:shadow-none text-2xl font-bold">
            B
        </button>

    </div>

</div>

<script>

    // ==========================================
    // UUID
    // ==========================================

    const UART_SERVICE_UUID =
        '6e400001-b5a3-f393-e0a9-e50e24dcca9e';

    // Web -> micro:bit
    const UART_RX_CHARACTERISTIC_UUID =
        '6e400002-b5a3-f393-e0a9-e50e24dcca9e';


    // ==========================================
    // UI
    // ==========================================

    const connectBtn = document.getElementById('connectBtn');

    const btIndicator =
        document.getElementById('bt-indicator');

    const btStatus =
        document.getElementById('bt-status');

    const xValDisplay =
        document.getElementById('x-val');

    const yValDisplay =
        document.getElementById('y-val');

    const cmdValDisplay =
        document.getElementById('cmd-val');

    const base =
        document.getElementById('joystick-base');

    const stick =
        document.getElementById('joystick-stick');


    // ==========================================
    // Bluetooth
    // ==========================================

    let bluetoothDevice = null;

    let rxCharacteristic = null;


    // ==========================================
    // 搖桿參數
    // ==========================================

    let isDragging = false;

    let maxDistance =
        base.offsetWidth / 2 - stick.offsetWidth / 2;


    // ==========================================
    // 連線
    // ==========================================

    connectBtn.addEventListener('click', async () => {

        if (!navigator.bluetooth) {

            alert('請使用 Chrome 或 Edge');

            return;
        }

        try {

            btStatus.innerText = '搜尋中...';

            bluetoothDevice =
                await navigator.bluetooth.requestDevice({

                    filters: [
                        {
                            namePrefix: 'BBC micro:bit'
                        }
                    ],

                    optionalServices: [
                        UART_SERVICE_UUID
                    ]
                });

            bluetoothDevice.addEventListener(
                'gattserverdisconnected',
                onDisconnected
            );

            btStatus.innerText = '連線中...';

            const server =
                await bluetoothDevice.gatt.connect();

            const service =
                await server.getPrimaryService(
                    UART_SERVICE_UUID
                );

            rxCharacteristic =
                await service.getCharacteristic(
                    UART_RX_CHARACTERISTIC_UUID
                );

            updateBluetoothUI(true);

            sendBluetoothData("S\n");

        }
        catch (error) {

            console.error(error);

            btStatus.innerText = '連線失敗';

            updateBluetoothUI(false);
        }

    });


    // ==========================================
    // 斷線
    // ==========================================

    function onDisconnected() {

        updateBluetoothUI(false);

        rxCharacteristic = null;

        bluetoothDevice = null;

        btStatus.innerText = '已斷線';
    }


    // ==========================================
    // UI 更新
    // ==========================================

    function updateBluetoothUI(isConnected) {

        if (isConnected) {

            btIndicator.classList.remove(
                'bg-red-500'
            );

            btIndicator.classList.add(
                'bg-green-500'
            );

            btStatus.innerText =
                '已連接 micro:bit';

            connectBtn.innerText =
                '斷線';

        }
        else {

            btIndicator.classList.remove(
                'bg-green-500'
            );

            btIndicator.classList.add(
                'bg-red-500'
            );

            connectBtn.innerText =
                '連接';
        }
    }


    // ==========================================
    // 傳送資料
    // ==========================================

  // 修改後的發送函式，增加對特徵值的檢查
async function sendBluetoothData(dataString) {
    if (!txCharacteristic) {
        console.warn("藍牙未連線，無法發送:", dataString);
        return;
    }
    try {
        const encoder = new TextEncoder();
        const data = encoder.encode(dataString);
        // 使用 writeValueWithoutResponse，對於 micro:bit UART 通常更穩定且速度更快
        if (txCharacteristic.writeValueWithoutResponse) {
            await txCharacteristic.writeValueWithoutResponse(data);
        } else {
            await txCharacteristic.writeValue(data);
        }
        console.log("已發送:", dataString.trim());
    } catch (error) {
        console.error("發送資料失敗 (GATT Error):", error);
        // 如果失敗，嘗試斷開連接重新連線
        if (error.name === 'NotSupportedError' || error.name === 'NetworkError') {
            onDisconnected();
        }
    }
}
    // ==========================================
    // 搖桿
    // ==========================================

    function joystickStart(e) {

        isDragging = true;

        stick.classList.remove('snap-back');

        joystickMove(e);
    }

    function joystickMove(e) {

        if (!isDragging) return;

        e.preventDefault();

        const clientX =
            e.touches ?
            e.touches[0].clientX :
            e.clientX;

        const clientY =
            e.touches ?
            e.touches[0].clientY :
            e.clientY;

        const rect =
            base.getBoundingClientRect();

        const centerX =
            rect.left + rect.width / 2;

        const centerY =
            rect.top + rect.height / 2;

        let dx = clientX - centerX;

        let dy = clientY - centerY;

        const distance =
            Math.hypot(dx, dy);

        const angle =
            Math.atan2(dy, dx);

        if (distance > maxDistance) {

            dx =
                Math.cos(angle) * maxDistance;

            dy =
                Math.sin(angle) * maxDistance;
        }

        stick.style.transform =
            `translate(${dx}px, ${dy}px)`;

        const mappedX =
            Math.round((dx / maxDistance) * 100);

        const mappedY =
            Math.round(-(dy / maxDistance) * 100);

        xValDisplay.innerText = mappedX;

        yValDisplay.innerText = mappedY;

        processCommand(mappedX, mappedY);
    }

    function joystickEnd() {

        isDragging = false;

        stick.classList.add('snap-back');

        stick.style.transform =
            `translate(0px,0px)`;

        xValDisplay.innerText = 0;

        yValDisplay.innerText = 0;

        processCommand(0, 0);
    }


    // ==========================================
    // 指令判斷
    // ==========================================

    let lastCommand = '';

    function processCommand(x, y) {

        const threshold = 30;

        let cmd = 'S';

        if (
            Math.abs(x) < threshold &&
            Math.abs(y) < threshold
        ) {
            cmd = 'S';
        }
        else if (
            y > threshold &&
            Math.abs(y) > Math.abs(x)
        ) {
            cmd = 'F';
        }
        else if (
            y < -threshold &&
            Math.abs(y) > Math.abs(x)
        ) {
            cmd = 'B';
        }
        else if (
            x > threshold &&
            Math.abs(x) > Math.abs(y)
        ) {
            cmd = 'R';
        }
        else if (
            x < -threshold &&
            Math.abs(x) > Math.abs(y)
        ) {
            cmd = 'L';
        }

        if (cmd !== lastCommand) {

            cmdValDisplay.innerText = cmd;

            sendBluetoothData(cmd + '\n');

            lastCommand = cmd;
        }
    }


    // ==========================================
    // 搖桿事件
    // ==========================================

    stick.addEventListener(
        'mousedown',
        joystickStart
    );

    document.addEventListener(
        'mousemove',
        joystickMove
    );

    document.addEventListener(
        'mouseup',
        joystickEnd
    );

    stick.addEventListener(
        'touchstart',
        joystickStart,
        { passive: false }
    );

    document.addEventListener(
        'touchmove',
        joystickMove,
        { passive: false }
    );

    document.addEventListener(
        'touchend',
        joystickEnd
    );


    // ==========================================
    // A/B 按鍵
    // ==========================================

    const btnA =
        document.getElementById('btn-a');

    const btnB =
        document.getElementById('btn-b');


    function buttonDown(name) {

        cmdValDisplay.innerText =
            `${name} DOWN`;

        sendBluetoothData(
            `BTN_${name}_DOWN\n`
        );
    }

    function buttonUp(name) {

        cmdValDisplay.innerText =
            `${name} UP`;

        sendBluetoothData(
            `BTN_${name}_UP\n`
        );
    }


    btnA.addEventListener(
        'mousedown',
        () => buttonDown('A')
    );

    btnA.addEventListener(
        'mouseup',
        () => buttonUp('A')
    );

    btnB.addEventListener(
        'mousedown',
        () => buttonDown('B')
    );

    btnB.addEventListener(
        'mouseup',
        () => buttonUp('B')
    );

</script>

</body>
</html>
