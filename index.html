<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web 虛擬搖桿控制器</title>
 <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            overscroll-behavior-y: contain;
            touch-action: none;
        }
        #joystick-base, #slider-left-base, #slider-right-base {
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 4px 10px rgba(0,0,0,0.3);
        }
        #joystick-stick, #slider-left-stick, #slider-right-stick {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), inset 0 -3px 6px rgba(0,0,0,0.2);
            transition: transform 0.05s linear;
        }
        .snap-back {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }
    </style>
</head>
<body class="bg-gray-900 text-white h-[100dvh] w-screen overflow-hidden font-sans select-none touch-none overscroll-none">
    <div class="w-full h-full max-w-7xl mx-auto flex flex-col landscape:flex-row relative">
        <!-- 資訊與連線狀態區 -->
        <div class="w-full landscape:w-1/3 flex flex-col items-center justify-start landscape:justify-center pt-2 sm:pt-4 landscape:pt-0 px-2 order-1 landscape:order-2 z-10">
            <div class="text-center w-full max-w-sm">
                <h1 class="text-xl sm:text-2xl font-bold mb-1 tracking-wider">虛擬搖桿控制器</h1>
                <p class="text-gray-400 text-[10px] sm:text-xs mb-2">HTML5 + Web Bluetooth API</p>
                <div class="bg-gray-800 rounded-2xl p-3 sm:p-4 shadow-xl border border-gray-700">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-2">
                            <div id="bt-indicator" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]"></div>
                            <span id="bt-status" class="font-medium text-gray-300 text-xs sm:text-sm">未連接藍牙</span>
                        </div>
                        <button id="connectBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors shadow-lg active:scale-95 flex items-center space-x-1">
                            <span>連接</span>
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-center">
                        <div class="bg-gray-900 p-2 rounded-lg border border-gray-700">
                            <div class="text-gray-500 text-[10px] mb-1">X/左 軸</div>
                            <div id="x-val" class="text-base sm:text-lg font-mono font-bold text-blue-400">0</div>
                        </div>
                        <div class="bg-gray-900 p-2 rounded-lg border border-gray-700">
                            <div class="text-gray-500 text-[10px] mb-1">Y/右 軸</div>
                            <div id="y-val" class="text-base sm:text-lg font-mono font-bold text-green-400">0</div>
                        </div>
                    </div>
                    <div class="mt-3 bg-gray-900 p-2 rounded-lg border border-gray-700 flex justify-between items-center">
                        <span class="text-gray-500 text-[10px]">當前指令:</span>
                        <span id="cmd-val" class="text-sm sm:text-base font-mono font-bold text-yellow-400">S (停止)</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 搖桿區 -->
        <div class="absolute bottom-6 left-4 sm:bottom-12 sm:left-12 landscape:static landscape:w-1/3 flex flex-col items-center landscape:items-center justify-end landscape:justify-center order-2 landscape:order-1 z-20">
            <button id="toggle-mode-btn" class="mb-4 sm:mb-6 bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-full text-xs font-medium transition-colors shadow-[0_4px_0_#374151] active:shadow-[0_0px_0_#374151] active:translate-y-[4px] border border-gray-600 flex items-center gap-2 select-none touch-none">
                切換雙拉霸
            </button>
            <div id="joystick-base" class="relative w-32 h-32 sm:w-48 sm:h-48 bg-gray-800 rounded-full border-4 border-gray-700 flex items-center justify-center shrink-0">
                <div class="absolute w-full h-0.5 bg-gray-700 opacity-30"></div>
                <div class="absolute h-full w-0.5 bg-gray-700 opacity-30"></div>
                <div id="joystick-stick" class="absolute w-12 h-12 sm:w-20 sm:h-20 bg-gradient-to-br from-gray-500 to-gray-700 rounded-full cursor-pointer z-10 flex items-center justify-center border border-gray-500">
                    <div class="w-6 h-6 sm:w-10 sm:h-10 rounded-full bg-gradient-to-br from-gray-600 to-gray-800 border border-gray-600 shadow-inner"></div>
                </div>
            </div>
            <div id="slider-left-base" class="hidden relative w-16 h-36 sm:w-20 sm:h-52 bg-gray-800 rounded-full border-4 border-gray-700 flex items-center justify-center shrink-0">
                <div class="absolute h-full w-0.5 bg-gray-700 opacity-30"></div>
                <div id="slider-left-stick" class="absolute w-14 h-14 sm:w-20 sm:h-20 bg-gradient-to-br from-gray-500 to-gray-700 rounded-full cursor-pointer z-10 flex items-center justify-center border border-gray-500">
                    <div class="w-6 h-6 sm:w-10 sm:h-10 rounded-full bg-gradient-to-br from-gray-600 to-gray-800 border border-gray-600 shadow-inner"></div>
                </div>
            </div>
        </div>

        <!-- 按鍵區 -->
        <div class="absolute bottom-6 right-4 sm:bottom-12 sm:right-12 landscape:static landscape:w-1/3 flex items-end landscape:items-center justify-end landscape:pr-12 order-3 landscape:order-3 z-20">
            <div class="flex flex-row items-center gap-6 sm:gap-10">
                <div class="flex flex-col gap-4 sm:gap-6 shrink-0">
                    <div class="flex justify-end w-full pl-6 sm:pl-12">
                        <button id="btn-b" class="w-12 h-12 sm:w-16 sm:h-16 bg-red-600 rounded-full shadow-[0_6px_0_#7f1d1d] active:shadow-[0_0px_0_#7f1d1d] active:translate-y-[6px] text-lg sm:text-2xl font-bold text-white border border-red-500">B</button>
                    </div>
                    <div class="flex justify-start w-full pr-6 sm:pr-12">
                        <button id="btn-a" class="w-12 h-12 sm:w-16 sm:h-16 bg-blue-600 rounded-full shadow-[0_6px_0_#1e3a8a] active:shadow-[0_0px_0_#1e3a8a] active:translate-y-[6px] text-lg sm:text-2xl font-bold text-white border border-blue-500">A</button>
                    </div>
                </div>
                <div id="slider-right-base" class="hidden relative w-16 h-36 sm:w-20 sm:h-52 bg-gray-800 rounded-full border-4 border-gray-700 flex items-center justify-center shrink-0">
                    <div class="absolute h-full w-0.5 bg-gray-700 opacity-30"></div>
                    <div id="slider-right-stick" class="absolute w-14 h-14 sm:w-20 sm:h-20 bg-gradient-to-br from-gray-500 to-gray-700 rounded-full cursor-pointer z-10 flex items-center justify-center border border-gray-500">
                        <div class="w-6 h-6 sm:w-10 sm:h-10 rounded-full bg-gradient-to-br from-gray-600 to-gray-800 border border-gray-600 shadow-inner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isSliderMode = false;
        const toggleModeBtn = document.getElementById('toggle-mode-btn');
        const joystickBase = document.getElementById('joystick-base');
        const sliderLeftBase = document.getElementById('slider-left-base');
        const sliderRightBase = document.getElementById('slider-right-base');

        toggleModeBtn.addEventListener('click', () => {
            isSliderMode = !isSliderMode;
            if (isSliderMode) {
                toggleModeBtn.innerHTML = '切換單搖桿';
                joystickBase.classList.add('hidden');
                sliderLeftBase.classList.remove('hidden');
                sliderRightBase.classList.remove('hidden');
                handleJoystickEnd();
                handleSliderEnd('left');
                handleSliderEnd('right');
            } else {
                toggleModeBtn.innerHTML = '切換雙拉霸';
                joystickBase.classList.remove('hidden');
                sliderLeftBase.classList.add('hidden');
                sliderRightBase.classList.add('hidden');
                handleJoystickEnd();
                handleSliderEnd('left');
                handleSliderEnd('right');
            }
            updateDimensions();
        });

        const base = document.getElementById('joystick-base');
        const stick = document.getElementById('joystick-stick');
        const sliderLeftStick = document.getElementById('slider-left-stick');
        const sliderRightStick = document.getElementById('slider-right-stick');
        const xValDisplay = document.getElementById('x-val');
        const yValDisplay = document.getElementById('y-val');
        const cmdValDisplay = document.getElementById('cmd-val');

        let isDraggingJoystick = false;
        let maxDistanceJoystick = 0;
        let maxDistanceSlider = 0;
        let leftSliderVal = 0;
        let rightSliderVal = 0;
        
        function updateDimensions() {
            maxDistanceJoystick = base.offsetWidth / 2 - stick.offsetWidth / 2;
            maxDistanceSlider = sliderLeftBase.offsetHeight / 2 - sliderLeftStick.offsetHeight / 2;
        }
        window.addEventListener('resize', updateDimensions);
        setTimeout(updateDimensions, 100);

        const handleJoystickStart = (e) => {
            if (isSliderMode) return;
            isDraggingJoystick = true;
            stick.classList.remove('snap-back');
            handleJoystickMove(e);
        };

        const handleJoystickMove = (e) => {
            if (!isDraggingJoystick || isSliderMode) return;
            e.preventDefault(); 
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = base.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = clientX - centerX;
            let dy = clientY - centerY;
            const distance = Math.hypot(dx, dy);
            const angle = Math.atan2(dy, dx);
            if (distance > maxDistanceJoystick) {
                dx = Math.cos(angle) * maxDistanceJoystick;
                dy = Math.sin(angle) * maxDistanceJoystick;
            }
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            const mappedX = Math.round((dx / maxDistanceJoystick) * 100);
            const mappedY = Math.round(-(dy / maxDistanceJoystick) * 100);
            xValDisplay.innerText = mappedX;
            yValDisplay.innerText = mappedY;
            processCommand(mappedX, mappedY);
        };

        const handleJoystickEnd = () => {
            isDraggingJoystick = false;
            stick.classList.add('snap-back');
            stick.style.transform = `translate(0px, 0px)`;
            if(!isSliderMode){
                xValDisplay.innerText = 0;
                yValDisplay.innerText = 0;
                processCommand(0, 0);
            }
        };

        stick.addEventListener('mousedown', handleJoystickStart);
        document.addEventListener('mousemove', handleJoystickMove);
        document.addEventListener('mouseup', handleJoystickEnd);
        stick.addEventListener('touchstart', handleJoystickStart, { passive: false });
        document.addEventListener('touchmove', handleJoystickMove, { passive: false });
        document.addEventListener('touchend', handleJoystickEnd);

        function setupSlider(baseEl, stickEl, side) {
            let isDraggingSlider = false;
            const handleStart = (e) => {
                if (!isSliderMode) return;
                isDraggingSlider = true;
                stickEl.classList.remove('snap-back');
                handleMove(e);
            };
            const handleMove = (e) => {
                if (!isDraggingSlider || !isSliderMode) return;
                e.preventDefault();
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const rect = baseEl.getBoundingClientRect();
                const centerY = rect.top + rect.height / 2;
                let dy = clientY - centerY;
                if (dy > maxDistanceSlider) dy = maxDistanceSlider;
                if (dy < -maxDistanceSlider) dy = -maxDistanceSlider;
                stickEl.style.transform = `translate(0px, ${dy}px)`;
                const val = Math.round(-(dy / maxDistanceSlider) * 100);
                if (side === 'left') {
                    leftSliderVal = val;
                    xValDisplay.innerText = val;
                } else {
                    rightSliderVal = val;
                    yValDisplay.innerText = val;
                }
                processSliderCommand();
            };
            const handleEndLocal = () => {
                isDraggingSlider = false;
                stickEl.classList.add('snap-back');
                stickEl.style.transform = `translate(0px, 0px)`;
                if (isSliderMode) {
                    if (side === 'left') { leftSliderVal = 0; xValDisplay.innerText = 0; }
                    else { rightSliderVal = 0; yValDisplay.innerText = 0; }
                    processSliderCommand();
                }
            };
            stickEl.addEventListener('mousedown', handleStart);
            document.addEventListener('mousemove', handleMove);
            document.addEventListener('mouseup', handleEndLocal);
            stickEl.addEventListener('touchstart', handleStart, { passive: false });
            document.addEventListener('touchmove', handleMove, { passive: false });
            document.addEventListener('touchend', handleEndLocal);
            return handleEndLocal;
        }

        const handleSliderEndLeft = setupSlider(sliderLeftBase, sliderLeftStick, 'left');
        const handleSliderEndRight = setupSlider(sliderRightBase, sliderRightStick, 'right');

        function handleSliderEnd(side) {
            if (side === 'left') handleSliderEndLeft();
            if (side === 'right') handleSliderEndRight();
        }

        let lastCommand = 'S'; // 預設停止代碼
        function processCommand(x, y) {
            let cmd = 'S'; 
            const threshold = 30; 
            if (Math.abs(x) < threshold && Math.abs(y) < threshold) {
                cmd = 'S'; 
            } else if (y > threshold && Math.abs(y) > Math.abs(x)) {
                cmd = 'F'; 
            } else if (y < -threshold && Math.abs(y) > Math.abs(x)) {
                cmd = 'B'; 
            } else if (x > threshold && Math.abs(x) > Math.abs(y)) {
                cmd = 'R'; 
            } else if (x < -threshold && Math.abs(x) > Math.abs(y)) {
                cmd = 'L'; 
            }
            if (cmd !== lastCommand) {
                const cmdMap = { 'F': 'F (前進)', 'B': 'B (後退)', 'L': 'L (左轉)', 'R': 'R (右轉)', 'S': 'S (停止)' };
                cmdValDisplay.innerText = cmdMap[cmd] || 'S (停止)';
                sendBluetoothData(cmd); // 傳送字串
                lastCommand = cmd;
            }
        }

        let lastSliderCmd = '';
        function processSliderCommand() {
            const cmdStr = `L${leftSliderVal} R${rightSliderVal}`;
            if (cmdStr !== lastSliderCmd) {
                cmdValDisplay.innerText = cmdStr;
                sendBluetoothData(cmdStr);
                lastSliderCmd = cmdStr;
            }
        }

        const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const UART_TX_CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; 
        let bluetoothDevice = null;
        let txCharacteristic = null;

        const connectBtn = document.getElementById('connectBtn');
        const btIndicator = document.getElementById('bt-indicator');
        const btStatus = document.getElementById('bt-status');

        connectBtn.addEventListener('click', async () => {
            if (!navigator.bluetooth) {
                alert('您的瀏覽器不支援 Web Bluetooth API。請使用 Chrome 或 Edge。');
                return;
            }
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                bluetoothDevice.gatt.disconnect();
                return;
            }
            try {
                btStatus.innerText = '搜尋裝置中...';
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [UART_SERVICE_UUID]
                });
                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);
                btStatus.innerText = '連接伺服器...';
                const server = await bluetoothDevice.gatt.connect();
                btStatus.innerText = '獲取服務...';
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                btStatus.innerText = '準備完成...';
                txCharacteristic = await service.getCharacteristic(UART_TX_CHARACTERISTIC_UUID);
                updateBluetoothUI(true);
                sendBluetoothData('S'); 
            } catch (error) {
                console.error("藍牙連線錯誤:", error);
                btStatus.innerText = '連線失敗或取消';
                updateBluetoothUI(false);
            }
        });

        function onDisconnected() {
            updateBluetoothUI(false);
            txCharacteristic = null;
            bluetoothDevice = null;
            btStatus.innerText = '已斷線';
        }

        function updateBluetoothUI(isConnected) {
            if (isConnected) {
                btIndicator.classList.remove('bg-red-500');
                btIndicator.classList.add('bg-green-500');
                btStatus.innerText = '已連接 micro:bit';
                connectBtn.innerHTML = '<span>斷開</span>';
            } else {
                btIndicator.classList.remove('bg-green-500');
                btIndicator.classList.add('bg-red-500');
                connectBtn.innerHTML = '<span>連接</span>';
            }
        }

        let isWriting = false;
        let pendingMessage = null;

        async function sendBluetoothData(dataString) {
            // ⚡ 關鍵修正：不再使用 \r\n，改用極度可靠的 "#" 字元作為一筆資料的結尾
            const cleanData = dataString.trim() + "#"; 
            if (!txCharacteristic) {
                console.log("[藍牙未連接 - 模擬發送]:", cleanData);
                return;
            }
            if (isWriting) {
                pendingMessage = cleanData;
                return;
            }
            isWriting = true;
            try {
                const encoder = new TextEncoder();
                const data = encoder.encode(cleanData);
                if (txCharacteristic.writeValueWithoutResponse) {
                    await txCharacteristic.writeValueWithoutResponse(data);
                } else {
                    await txCharacteristic.writeValue(data);
                }
                console.log("實際已發送:", cleanData);
            } catch (error) {
                console.error("發送資料失敗:", error);
            } finally {
                isWriting = false;
                if (pendingMessage !== null) {
                    const nextMsg = pendingMessage;
                    pendingMessage = null;
                    sendBluetoothData(nextMsg);
                }
            }
        }

        const btnA = document.getElementById('btn-a');
        const btnB = document.getElementById('btn-b');

        function handleButtonPress(btnName) {
            cmdValDisplay.innerText = `${btnName} 鍵 (按下)`;
            sendBluetoothData(`BTN_${btnName}_DOWN`);
        }
        function handleButtonRelease(btnName) {
            cmdValDisplay.innerText = `${btnName} 鍵 (放開)`;
            sendBluetoothData(`BTN_${btnName}_UP`);
            setTimeout(() => {
                if (isSliderMode) {
                    cmdValDisplay.innerText = lastSliderCmd || 'L0 R0';
                } else {
                    const cmdMap = { 'F': 'F (前進)', 'B': 'B (後退)', 'L': 'L (左轉)', 'R': 'R (右轉)', 'S': 'S (停止)' };
                    cmdValDisplay.innerText = cmdMap[lastCommand] || 'S (停止)';
                }
            }, 500);
        }

        btnA.addEventListener('mousedown', () => handleButtonPress('A'));
        btnA.addEventListener('touchstart', (e) => { e.preventDefault(); handleButtonPress('A'); }, { passive: false });
        btnA.addEventListener('mouseup', () => handleButtonRelease('A'));
        btnA.addEventListener('touchend', (e) => { e.preventDefault(); handleButtonRelease('A'); }, { passive: false });

        btnB.addEventListener('mousedown', () => handleButtonPress('B'));
        btnB.addEventListener('touchstart', (e) => { e.preventDefault(); handleButtonPress('B'); }, { passive: false });
        btnB.addEventListener('mouseup', () => handleButtonRelease('B'));
        btnB.addEventListener('touchend', (e) => { e.preventDefault(); handleButtonRelease('B'); }, { passive: false });
    </script>
</body>
</html>
